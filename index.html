<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0">
  <title>Summit Metal Supply Roof Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@latest/font/lucide.css"/>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; }
    input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .input-field { border: 1px solid #cbd5e1; border-radius: 0.5rem; padding: 0.5rem 0.75rem; width: 100%; transition: all 0.2s; font-size: 0.875rem; }
    .input-field:focus { border-color: #3b82f6; outline: 2px solid #dbeafe; }
    .section-label { background: white; border: 3px solid #1e40af; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); font-size: 2.25rem; font-weight: 900; letter-spacing: -2px; padding: 14px 32px; border-radius: 9999px; min-width: 180px; text-align: center; }
    .calc-highlight { background-color: #eff6ff !important; border-color: #3b82f6 !important; font-weight: 800; color: #1e40af; }
    @media print { .no-print { display: none !important; } }
  </style>
</head>
<body class="min-h-screen bg-slate-50 p-2 md:p-8">
  <div class="max-w-7xl mx-auto">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-6">
      <div class="flex-1">
        <div class="text-blue-700 text-3xl md:text-4xl font-extrabold tracking-[-2px]">SUMMIT METAL SUPPLY</div>
        <h1 class="text-2xl md:text-3xl font-bold text-slate-900">Roof Calculator</h1>
        <div class="mt-3 flex items-center gap-3">
          <span class="font-semibold text-slate-600">Project Name:</span>
          <input id="project-name" type="text" class="input-field max-w-md no-print">
        </div>
      </div>
      <div class="no-print"><button onclick="window.print()" class="bg-slate-800 text-white px-6 py-2 rounded-xl font-bold">Print PDF</button></div>
    </div>

    <div id="summary-container" class="mb-8 bg-blue-900 text-white rounded-xl p-4 md:p-6 shadow-lg">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-blue-800/40 p-4 rounded-lg"><p class="text-blue-200 text-xs uppercase font-black">Total Panels</p><p id="total-panels" class="text-3xl font-bold">0</p></div>
        <div class="bg-blue-800/40 p-4 rounded-lg"><p class="text-blue-200 text-xs uppercase font-black">Total Linear Feet</p><p class="text-3xl font-bold"><span id="total-linear-ft">0.0</span> ft</p></div>
        <div class="bg-blue-800/40 p-4 rounded-lg"><p class="text-blue-200 text-xs uppercase font-black">Total Square Feet</p><p class="text-3xl font-bold"><span id="total-sq-ft">0</span></p></div>
      </div>
      <div class="mt-6 pt-6 border-t border-blue-800/30">
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 text-center">
          <div><p class="text-[10px] uppercase text-blue-300">Ridge</p><p id="ridge-caps" class="font-bold">0</p></div>
          <div><p class="text-[10px] uppercase text-blue-300">Eave</p><p id="eave-trims" class="font-bold">0</p></div>
          <div><p class="text-[10px] uppercase text-blue-300">Valley</p><p id="valley-flashing" class="font-bold">0</p></div>
          <div><p class="text-[10px] uppercase text-blue-300">Hip</p><p id="hip-caps" class="font-bold">0</p></div>
          <div><p class="text-[10px] uppercase text-blue-300">Gable</p><p id="gable-trim" class="font-bold">0</p></div>
          <div><p class="text-[10px] uppercase text-blue-300">Screws</p><p id="total-screws" class="font-bold">0</p></div>
        </div>
      </div>
    </div>

    <div class="mb-6 no-print text-right">
      <button onclick="addSection()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition-transform active:scale-95">
        + Add Roof Section
      </button>
    </div>

    <div id="sections-container" class="space-y-8"></div>
  </div>

  <div id="dormer-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden">
      <div class="p-4 border-b bg-slate-50 flex justify-between items-center"><h3 class="font-bold uppercase text-sm tracking-widest">Dormer Settings</h3><button onclick="closeDormerModal()" class="text-2xl font-bold">&times;</button></div>
      <div class="p-6 space-y-4">
        <div><label class="text-[10px] font-bold text-slate-500 uppercase">Left to Dormer (In)</label><input type="number" id="m-dormer-left" class="input-field mt-1" oninput="saveDormerData()"></div>
        <div><label class="text-[10px] font-bold text-slate-500 uppercase">Dormer Width (In)</label><input type="number" id="m-dormer-width" class="input-field mt-1" oninput="saveDormerData()"></div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="text-[10px] font-bold text-slate-500 uppercase">Eave to Dormer</label><input type="number" id="m-dormer-bottom" class="input-field mt-1" oninput="saveDormerData()"></div>
          <div><label class="text-[10px] font-bold text-slate-500 uppercase">Ridge to Dormer</label><input type="number" id="m-dormer-top" class="input-field mt-1" oninput="saveDormerData()"></div>
        </div>
      </div>
      <div class="p-4 bg-slate-50 text-right"><button onclick="closeDormerModal()" class="bg-blue-600 text-white px-8 py-2 rounded-lg font-bold">Done</button></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>
  <script>
    let activeDormerId = null, sections = [], lastProfile = 'tuff', lastPitch = 4;

    function calculate(s) {
      const r = parseFloat(s.ridge)||0, e = parseFloat(s.eave)||0, cov = parseFloat(s.coverage)||36, fold = parseFloat(s.eaveFold)||0;
      let h = parseFloat(s.height);

      // RESTORED: TRIG HEIGHT LOGIC
      if (isNaN(h) || h <= 0) {
        if (s.hipLen > 0) {
          const runDiff = Math.abs(r - e);
          const slopeFactor = Math.sqrt(1 + Math.pow(parseFloat(s.pitch)/12, 2));
          h = Math.sqrt(Math.pow(s.hipLen, 2) - Math.pow(runDiff, 2)) / slopeFactor;
          const hInput = document.getElementById(`height-input-${s.id}`);
          if(hInput) { hInput.value = h.toFixed(2); hInput.classList.add('calc-highlight'); hInput.readOnly = true; }
        }
      } else {
        const hInput = document.getElementById(`height-input-${s.id}`);
        if(hInput) { hInput.classList.remove('calc-highlight'); hInput.readOnly = false; }
      }

      if (cov <= 0 || (r <= 0 && e <= 0) || h <= 0 || isNaN(h)) return null;

      const maxW = Math.max(r, e), totalP = Math.ceil(maxW / cov), data = [];
      const hDiff = Math.abs(r - e), slope = hDiff > 0 ? h / hDiff : 0;
      const minRE = Math.min(r, e), flatStart = (maxW - minRE) / 2, flatEnd = flatStart + minRE;

      for (let i = 0; i < totalP; i++) {
        let startX;
        if (s.config === 'left') startX = maxW - ((i + 1) * cov);
        else if (s.config === 'both') startX = (maxW / 2) - ((totalP / 2 - i) * cov);
        else startX = i * cov;

        let base;
        const endX = startX + cov;
        if (s.config === 'both') {
          if (startX < flatStart) base = h - ((flatStart - Math.min(endX, flatStart)) * slope);
          else if (startX >= flatEnd) base = h - ((startX - flatEnd) * slope);
          else base = h;
        } else if (s.config === 'left') {
          base = endX < (maxW - minRE) ? h - ((maxW - minRE - endX) * slope) : h;
        } else {
          base = startX < minRE ? h : h - ((startX - minRE) * slope);
        }

        if (s.hasDormer) {
          const d = s.dormer;
          if (startX >= d.left && endX <= (d.left + d.width)) {
             data.push({ len: Math.ceil(d.bottom + fold), type: 'under', xPos: startX });
             data.push({ len: Math.ceil(h - d.bottom - d.top + fold), type: 'over', xPos: startX });
             continue;
          }
        }
        data.push({ len: Math.ceil(Math.max(0, base + fold)), type: 'standard', xPos: startX });
      }
      return { panelData: data, maxW, coverage: cov, finalH: h };
    }

    function updateSummary() {
      let tP = 0, tIn = 0, tSq = 0, tR = 0, tE = 0, tG = 0;
      sections.forEach(s => {
        const res = calculate(s);
        if (res) {
          tP += res.panelData.length;
          const sIn = res.panelData.reduce((sum, p) => sum + p.len, 0);
          tIn += sIn; tSq += (sIn / 12) * (res.coverage / 12);
          tR += (s.topWall ? 0 : parseFloat(s.ridge)||0);
          tE += parseFloat(s.eave)||0;
          tG += (s.config === 'both' ? res.finalH * 2 : res.finalH);
        }
      });
      document.getElementById('total-panels').innerText = tP;
      document.getElementById('total-linear-ft').innerText = (tIn / 12).toFixed(1);
      document.getElementById('total-sq-ft').innerText = Math.ceil(tSq);
      document.getElementById('ridge-caps').innerText = Math.ceil(tR / 120);
      document.getElementById('eave-trims').innerText = Math.ceil(tE / 120);
      document.getElementById('gable-trim').innerText = Math.ceil(tG / 120);
      document.getElementById('total-screws').innerText = Math.ceil(tSq);
    }

    function updateUI(id) {
      const s = sections.find(x => x.id === id), res = calculate(s);
      const svg = document.getElementById(`svg-${id}`), list = document.getElementById(`list-${id}`);
      if (!res) { svg.innerHTML = ''; list.innerHTML = ''; return; }

      const w = 800, h = 300, m = 40, scale = (w - 2 * m) / res.maxW;
      const rW = (parseFloat(s.ridge)||0) * scale, eW = (parseFloat(s.eave)||0) * scale;
      let rX = m, eX = m;
      if (s.config === 'left') { rX = w - m - rW; eX = w - m - eW; }
      else if (s.config === 'both') { rX = m + (w - 2 * m - rW) / 2; eX = m + (w - 2 * m - eW) / 2; }

      // RESTORED: SVG GRIDLINES AND LABELS
      let pLines = '', pLabels = '';
      res.panelData.forEach((p) => {
        let x = m + (p.xPos * scale);
        if (s.config === 'both') x = m + (w - 2 * m - res.maxW * scale) / 2 + (p.xPos * scale);
        pLines += `<line x1="${x}" y1="${m}" x2="${x}" y2="${h-m}" stroke="#cbd5e1" stroke-dasharray="4" />`;
        pLabels += `<text x="${x + (res.coverage * scale) / 2}" y="${h / 2}" font-size="11" font-weight="bold" fill="#1e40af" text-anchor="middle">${p.len}</text>`;
      });

      svg.innerHTML = `
        <polygon points="${eX},${h-m} ${eX+eW},${h-m} ${rX+rW},${m} ${rX},${m}" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
        ${pLines} ${pLabels}
      `;
      
      let counts = {};
      res.panelData.forEach(p => counts[p.len] = (counts[p.len] || 0) + 1);
      list.innerHTML = `<table class="w-full text-xs">` + Object.entries(counts).map(([len, qty]) => `<tr class="border-b"><td class="p-2 font-bold">${qty}x</td><td class="p-2 text-right">${len}"</td></tr>`).join('') + `</table>`;
      updateSummary();
    }

    function addSection() {
      const s = { id: Date.now(), name: String.fromCharCode(65 + sections.length), ridge: '', eave: '', height: '', pitch: lastPitch, hipLen: '', profile: lastProfile, coverage: (lastProfile==='mechanical'?15.75:36), eaveFold: 0, config: 'right', hasDormer: false, topWall: false, dormer: {left:0, width:0, bottom:0, top:0} };
      sections.push(s);
      const div = document.createElement('div');
      div.className = "bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden";
      div.id = `section-${s.id}`;
      div.innerHTML = `
        <div class="p-4 bg-slate-50 border-b flex flex-wrap justify-between items-center gap-4">
          <input type="text" value="${s.name}" class="section-label" oninput="updateVal(${s.id}, 'name', this.value)">
          <div class="flex gap-4 no-print items-center">
            <label class="flex items-center gap-2 font-bold text-sm"><input type="checkbox" onchange="toggleDormer(${s.id}, this.checked)"> Dormer</label>
            <label class="flex items-center gap-2 font-bold text-sm text-orange-600"><input type="checkbox" onchange="updateVal(${s.id}, 'topWall', this.checked)"> Top Wall</label>
            <button onclick="removeSection(${s.id})" class="text-red-500 font-bold"><i data-lucide="trash-2"></i></button>
          </div>
        </div>
        <div class="p-4">
          <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3 mb-6">
            <div><label class="text-[10px] font-bold uppercase text-slate-400">Ridge (In)</label><input type="number" class="input-field" oninput="updateVal(${s.id}, 'ridge', parseFloat(this.value))"></div>
            <div><label class="text-[10px] font-bold uppercase text-slate-400">Eave (In)</label><input type="number" class="input-field" oninput="updateVal(${s.id}, 'eave', parseFloat(this.value))"></div>
            <div><label class="text-[10px] font-bold uppercase text-slate-400">Pitch (/12)</label><input type="number" class="input-field" value="${s.pitch}" oninput="updateVal(${s.id}, 'pitch', parseFloat(this.value))"></div>
            <div><label class="text-[10px] font-bold uppercase text-slate-400">Hip/Val (In)</label><input type="number" class="input-field" oninput="updateVal(${s.id}, 'hipLen', parseFloat(this.value))"></div>
            <div><label class="text-[10px] font-bold uppercase text-slate-400">Height (In)</label><input type="number" id="height-input-${s.id}" class="input-field" oninput="updateVal(${s.id}, 'height', parseFloat(this.value))"></div>
            <div><label class="text-[10px] font-bold uppercase text-slate-400">Profile</label>
              <select class="input-field" onchange="updateProfile(${s.id}, this.value)">
                <option value="tuff" ${s.profile==='tuff'?'selected':''}>Tuff (36")</option>
                <option value="mechanical" ${s.profile==='mechanical'?'selected':''}>Mech (15.75")</option>
                <option value="diamond" ${s.profile==='diamond'?'selected':''}>Diamond (36")</option>
              </select>
            </div>
            <div><label class="text-[10px] font-bold uppercase text-slate-400">Fold (In)</label><input type="number" class="input-field" oninput="updateVal(${s.id}, 'eaveFold', parseFloat(this.value))"></div>
            <div><label class="text-[10px] font-bold uppercase text-slate-400">Angle</label>
              <select class="input-field" onchange="updateVal(${s.id}, 'config', this.value)"><option value="right">Right</option><option value="left">Left</option><option value="both">Both</option></select>
            </div>
          </div>
          <div class="grid lg:grid-cols-4 gap-4">
            <div class="lg:col-span-3 bg-slate-50 border rounded-xl min-h-[300px] flex items-center justify-center p-2"><svg id="svg-${s.id}" viewBox="0 0 800 300" class="w-full h-full"></svg></div>
            <div id="list-${s.id}" class="border rounded-xl bg-white p-2"></div>
          </div>
        </div>`;
      document.getElementById('sections-container').appendChild(div);
      lucide.createIcons();
      updateUI(s.id);
    }

    function updateVal(id, f, val) { 
      const s = sections.find(x => x.id === id); 
      s[f] = val; 
      if (f === 'pitch') lastPitch = val;
      updateUI(id); 
    }
    function updateProfile(id, val) {
      const s = sections.find(x => x.id === id);
      s.profile = val; s.coverage = (val === 'mechanical' ? 15.75 : 36);
      lastProfile = val;
      updateUI(id);
    }
    function removeSection(id) { sections = sections.filter(x => x.id !== id); document.getElementById(`section-${id}`).remove(); updateSummary(); }
    function toggleDormer(id, chk) { activeDormerId = id; if(chk) document.getElementById('dormer-modal').classList.remove('hidden'); else { sections.find(x => x.id === id).hasDormer = false; updateUI(id); } }
    function closeDormerModal() { document.getElementById('dormer-modal').classList.add('hidden'); sections.find(x => x.id === activeDormerId).hasDormer = true; updateUI(activeDormerId); }
    function saveDormerData() {
      const s = sections.find(x => x.id === activeDormerId);
      s.dormer = { left: parseFloat(document.getElementById('m-dormer-left').value)||0, width: parseFloat(document.getElementById('m-dormer-width').value)||0, bottom: parseFloat(document.getElementById('m-dormer-bottom').value)||0, top: parseFloat(document.getElementById('m-dormer-top').value)||0 };
    }

    addSection();
    lucide.createIcons();
  </script>
</body>
</html>
