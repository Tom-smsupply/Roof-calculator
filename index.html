<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0">
<title>Summit Metal Supply Roof Calculator</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@latest/font/lucide.css"/>

<style>
body { font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; }
.input-field { border:1px solid #cbd5e1; border-radius:0.5rem; padding:0.5rem; width:100%; }
.section-label { background:white; border:3px solid #1e40af; font-size:2rem; font-weight:900; padding:10px 20px; border-radius:9999px; }
</style>
</head>

<body class="bg-slate-50 p-4">

<div class="max-w-6xl mx-auto">
<h1 class="text-2xl font-bold mb-4">Roof Calculator</h1>

<div id="sections-container"></div>

<button onclick="addSection()" class="bg-blue-600 text-white px-4 py-2 rounded mt-6">Add Section</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>

<script>
let sections = [];

// ================= EXISTING CALCULATE (UNCHANGED) =================
function calculate(s){
  const cov=parseFloat(s.coverage)||0,r=parseFloat(s.ridge)||0,e=parseFloat(s.eave)||0,h=parseFloat(s.height)||0;
  if(cov<=0||(r<=0&&e<=0))return null;
  const maxW=Math.max(r,e),totalP=Math.ceil(maxW/cov),data=[];
  for(let i=0;i<totalP;i++){
    data.push({len:Math.ceil(h)});
  }
  return {panelData:data};
}

// ================= NEW LOGIC =================
function handleHeightInput(id,val){
  const s=sections.find(x=>x.id===id);

  if(val!==""){
    document.getElementById(`pitch-${id}`).value='';
    document.getElementById(`slope-${id}`).value='';
  }

  s.height=parseFloat(val)||0;
  updateUI(id);
}

function handlePitchInput(id){
  const s=sections.find(x=>x.id===id);

  const pitch=parseFloat(document.getElementById(`pitch-${id}`).value);
  const slopeLen=parseFloat(document.getElementById(`slope-${id}`).value);

  if(pitch||slopeLen){
    document.getElementById(`height-${id}`).value='';
  }

  if(pitch>0 && slopeLen>0){
    const angle=Math.atan(pitch/12);
    const height=slopeLen*Math.sin(angle);
    s.height=height;
    updateUI(id);
  }
}

// ================= UI =================
function updateUI(id){
  const s=sections.find(x=>x.id===id);
  const res=calculate(s);
  if(!res)return;
  document.getElementById(`output-${id}`).innerText="Panels: "+res.panelData.length;
}

function updateVal(id,field,val){
  const s=sections.find(x=>x.id===id);
  s[field]=val;
  updateUI(id);
}

function addSection(){
  const id=Date.now();
  const s={id,ridge:'',eave:'',height:'',coverage:36};
  sections.push(s);

  const div=document.createElement('div');
  div.className="bg-white p-4 rounded shadow mb-4";
  div.innerHTML=`
    <div class="grid grid-cols-2 md:grid-cols-6 gap-3 mb-3">

      <div>
        <label class="text-xs">Ridge</label>
        <input type="number" class="input-field" oninput="updateVal(${id},'ridge',this.value)">
      </div>

      <div>
        <label class="text-xs">Eave</label>
        <input type="number" class="input-field" oninput="updateVal(${id},'eave',this.value)">
      </div>

      <!-- HEIGHT INPUT -->
      <div>
        <label class="text-xs">Height</label>
        <input type="number" id="height-${id}" class="input-field"
          oninput="handleHeightInput(${id},this.value)">
      </div>

      <!-- NEW PITCH -->
      <div>
        <label class="text-xs">Pitch (X/12)</label>
        <input type="number" id="pitch-${id}" class="input-field"
          oninput="handlePitchInput(${id})">
      </div>

      <!-- NEW SLOPE -->
      <div>
        <label class="text-xs">Valley/Hip</label>
        <input type="number" id="slope-${id}" class="input-field"
          oninput="handlePitchInput(${id})">
      </div>

    </div>

    <div id="output-${id}" class="font-bold text-blue-700"></div>
  `;

  document.getElementById('sections-container').appendChild(div);
}

addSection();
</script>

</body>
</html>
